name: Deploy Aimoda

on:
  push:
    branches:
      - dev
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Load deploy SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PIXELSURGE_SSH_KEY }}

      - name: Trust deploy host
        run: ssh-keyscan -p "${{ secrets.PIXELSURGE_PORT }}" -H "${{ secrets.PIXELSURGE_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure deploy directory exists
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            TARGET_DIR="${{ secrets.PIXELSURGE_DEPLOY_DIR_PROD }}"
          else
            TARGET_DIR="${{ secrets.PIXELSURGE_DEPLOY_DIR_DEV }}"
          fi

          ssh -p "${{ secrets.PIXELSURGE_PORT }}" "${{ secrets.PIXELSURGE_USER }}@${{ secrets.PIXELSURGE_HOST }}" \
            "mkdir -p '$TARGET_DIR'"

      - name: Sync files to server
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            TARGET_DIR="${{ secrets.PIXELSURGE_DEPLOY_DIR_PROD }}"
          else
            TARGET_DIR="${{ secrets.PIXELSURGE_DEPLOY_DIR_DEV }}"
          fi

          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".playwright-mcp/" \
            --exclude "services/style-knowledge-mcp/" \
            --exclude "temp/" \
            -e "ssh -p ${{ secrets.PIXELSURGE_PORT }}" \
            ./ "${{ secrets.PIXELSURGE_USER }}@${{ secrets.PIXELSURGE_HOST }}:$TARGET_DIR/"

      - name: Write environment files on server
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            TARGET_DIR="${{ secrets.PIXELSURGE_DEPLOY_DIR_PROD }}"
          else
            TARGET_DIR="${{ secrets.PIXELSURGE_DEPLOY_DIR_DEV }}"
          fi
          mkdir -p /tmp/aimoda-env

          cat > /tmp/aimoda-env/server.dev.env <<'EOF'
          ${{ secrets.AIMODA_SERVER_ENV_DEV }}
          EOF

          cat > /tmp/aimoda-env/server.prod.env <<'EOF'
          ${{ secrets.AIMODA_SERVER_ENV_PROD }}
          EOF

          ssh -p "${{ secrets.PIXELSURGE_PORT }}" "${{ secrets.PIXELSURGE_USER }}@${{ secrets.PIXELSURGE_HOST }}" \
            "mkdir -p '$TARGET_DIR/env'"

          scp -P "${{ secrets.PIXELSURGE_PORT }}" /tmp/aimoda-env/server.dev.env \
            "${{ secrets.PIXELSURGE_USER }}@${{ secrets.PIXELSURGE_HOST }}:$TARGET_DIR/env/server.dev.env"

          scp -P "${{ secrets.PIXELSURGE_PORT }}" /tmp/aimoda-env/server.prod.env \
            "${{ secrets.PIXELSURGE_USER }}@${{ secrets.PIXELSURGE_HOST }}:$TARGET_DIR/env/server.prod.env"

      - name: Deploy stack on server
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            TARGET_ENV=prod
            TARGET_DIR="${{ secrets.PIXELSURGE_DEPLOY_DIR_PROD }}"
          else
            TARGET_ENV=dev
            TARGET_DIR="${{ secrets.PIXELSURGE_DEPLOY_DIR_DEV }}"
          fi

          ssh -p "${{ secrets.PIXELSURGE_PORT }}" "${{ secrets.PIXELSURGE_USER }}@${{ secrets.PIXELSURGE_HOST }}" \
            "cd '$TARGET_DIR' && ./scripts/deploy-stack.sh '$TARGET_ENV'"
