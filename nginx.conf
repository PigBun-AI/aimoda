upstream api_backend {
  server api:3000;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 1g;

  # Serve frontend React app (static files from frontend container)
  location / {
    proxy_pass http://frontend:80;
    proxy_redirect off;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SSE endpoint — must come before /api/ to take precedence
  location /api/chat {
    proxy_pass http://api_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Content-Type $http_content_type;
    proxy_set_header Content-Length $http_content_length;

    # Critical for SSE: disable all buffering
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding on;

    # Long timeouts for agent thinking
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 60s;
  }


  # Fashion Report MCP — reverse proxy to fashion-report-mcp service
  location /api/report-mcp {
    rewrite ^/api/report-mcp(/.*)$ $1 break;
    rewrite ^/api/report-mcp$ /mcp break;
    proxy_pass http://fashion-report-mcp:18770;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-API-Key $http_x_api_key;
    proxy_set_header Content-Type $http_content_type;
    proxy_set_header Content-Length $http_content_length;

    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding on;
    proxy_read_timeout 300s;
    client_max_body_size 200m;
  }

  # Inspiration Gallery MCP — reverse proxy to inspiration-gallery-mcp service
  location /api/gallery-mcp {
    rewrite ^/api/gallery-mcp(/.*)$ $1 break;
    rewrite ^/api/gallery-mcp$ /mcp break;
    proxy_pass http://inspiration-gallery-mcp:18760;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-API-Key $http_x_api_key;
    proxy_set_header Content-Type $http_content_type;
    proxy_set_header Content-Length $http_content_length;

    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding on;
    proxy_read_timeout 300s;
    client_max_body_size 100m;
  }

  # Style Knowledge MCP — reverse proxy to style-knowledge-mcp service
  location /api/style-mcp {
    rewrite ^/api/style-mcp(/.*)$ $1 break;
    rewrite ^/api/style-mcp$ /mcp break;
    proxy_pass http://style-knowledge-mcp:18750;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-API-Key $http_x_api_key;
    proxy_set_header Content-Type $http_content_type;
    proxy_set_header Content-Length $http_content_length;

    # SSE support for MCP streaming
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding on;
    proxy_read_timeout 300s;
  }

  # API proxy — preserve full /api/* path (no trailing slash on proxy_pass)
  location /api/ {
    proxy_pass http://api_backend;
    proxy_redirect off;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Content-Type $http_content_type;
    proxy_set_header Content-Length $http_content_length;
  }

  # Reports static files — bind-mounted at runtime
  location ^~ /reports/ {
    alias /reports/;
    autoindex off;
    add_header Cache-Control 'no-store';
    try_files $uri $uri/ =404;
  }

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
