name: ${COMPOSE_PROJECT_NAME:-aimoda-dev}

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ENV: production
      PORT: ${API_PORT:-3000}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:38180}
      SERVER_URL: ${SERVER_URL:-${FRONTEND_URL:-http://localhost:38180}}
      REPORTS_DIR: /reports
      DATABASE_PATH: /data/fashion-report.db
      ACCESS_TOKEN_EXPIRES_IN: ${ACCESS_TOKEN_EXPIRES_IN:-2h}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
      UPLOAD_TMP_DIR: /tmp/fashion-report-uploads
      REPORT_MCP_INTERNAL_TOKEN: ${REPORT_MCP_INTERNAL_TOKEN:-aimoda-report-mcp-internal-token}
      REPORT_MCP_SERVICE_USER_ID: ${REPORT_MCP_SERVICE_USER_ID:-1}
      TREND_FLOW_MCP_INTERNAL_TOKEN: ${TREND_FLOW_MCP_INTERNAL_TOKEN:-aimoda-trend-flow-mcp-internal-token}
      TREND_FLOW_MCP_SERVICE_USER_ID: ${TREND_FLOW_MCP_SERVICE_USER_ID:-1}
      # Agent / Chat
      QDRANT_URL: ${QDRANT_URL:-http://220.168.84.134:16333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:?QDRANT_API_KEY is required}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-fashion_items}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-qwen3.5-flash}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.1}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-32768}
      FALLBACK_LLM_ENABLED: ${FALLBACK_LLM_ENABLED:-true}
      FALLBACK_LLM_PROVIDER: ${FALLBACK_LLM_PROVIDER:-anthropic}
      FALLBACK_LLM_MODEL: ${FALLBACK_LLM_MODEL:-MiniMax-M2.7-highspeed}
      FALLBACK_LLM_API_KEY: ${FALLBACK_LLM_API_KEY:-}
      FALLBACK_LLM_BASE_URL: ${FALLBACK_LLM_BASE_URL:-https://api.minimaxi.com/anthropic}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      VLM_MODEL: ${VLM_MODEL:-qwen3.5-flash}
      VLM_TEMPERATURE: ${VLM_TEMPERATURE:-0.1}
      VLM_MAX_TOKENS: ${VLM_MAX_TOKENS:-1200}
      VLM_TIMEOUT_SECONDS: ${VLM_TIMEOUT_SECONDS:-45}
      EMBEDDING_URL: ${EMBEDDING_URL:-http://183.62.232.22:18730}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-Marqo/marqo-fashionSigLIP}
      POSTGRES_DSN: postgresql://fashion:fashion@postgres:5432/fashion_chat
      REDIS_DSN: redis://redis:6379/0
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      OSS_BUCKET_NAME: ${OSS_BUCKET_NAME:-}
      OSS_ENDPOINT: ${OSS_ENDPOINT:-oss-cn-shenzhen.aliyuncs.com}
      OSS_PUBLIC_BASE: ${OSS_PUBLIC_BASE:-}
      SMS_PROVIDER: ${SMS_PROVIDER:-mock}
      ALIYUN_SMS_ACCESS_KEY_ID: ${ALIYUN_SMS_ACCESS_KEY_ID:-}
      ALIYUN_SMS_ACCESS_KEY_SECRET: ${ALIYUN_SMS_ACCESS_KEY_SECRET:-}
      ALIYUN_SMS_ENDPOINT: ${ALIYUN_SMS_ENDPOINT:-dysmsapi.aliyuncs.com}
      ALIYUN_SMS_SIGN_NAME: ${ALIYUN_SMS_SIGN_NAME:-深圳市像素澎湃科技}
      ALIYUN_SMS_TEMPLATE_CODE: ${ALIYUN_SMS_TEMPLATE_CODE:-SMS_498250051}
      API_WORKERS: ${API_WORKERS:-4}
      API_BACKLOG: ${API_BACKLOG:-1024}
      API_KEEP_ALIVE_TIMEOUT: ${API_KEEP_ALIVE_TIMEOUT:-30}
    volumes:
      - db:/data
      - reports:/reports
    cpus: ${API_CPUS:-6}
    mem_limit: ${API_MEM_LIMIT:-6g}
    mem_reservation: ${API_MEM_RESERVATION:-2g}
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '${API_CPUS:-6}'
          memory: ${API_MEM_LIMIT:-6g}
        reservations:
          cpus: '${API_CPU_RESERVATION:-2}'
          memory: ${API_MEM_RESERVATION:-2g}
    healthcheck:
      test: ['CMD', 'python', '-c', 'import urllib.request; urllib.request.urlopen("http://localhost:3000/api/health")']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fashion
      POSTGRES_PASSWORD: fashion
      POSTGRES_DB: fashion_chat
    volumes:
      - pgdata:/var/lib/postgresql/data
    cpus: ${POSTGRES_CPUS:-2}
    mem_limit: ${POSTGRES_MEM_LIMIT:-2g}
    mem_reservation: ${POSTGRES_MEM_RESERVATION:-1g}
    deploy:
      resources:
        limits:
          cpus: '${POSTGRES_CPUS:-2}'
          memory: ${POSTGRES_MEM_LIMIT:-2g}
        reservations:
          cpus: '${POSTGRES_CPU_RESERVATION:-1}'
          memory: ${POSTGRES_MEM_RESERVATION:-1g}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fashion -d fashion_chat']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    cpus: ${REDIS_CPUS:-1}
    mem_limit: ${REDIS_MEM_LIMIT:-1g}
    mem_reservation: ${REDIS_MEM_RESERVATION:-256m}
    deploy:
      resources:
        limits:
          cpus: '${REDIS_CPUS:-1}'
          memory: ${REDIS_MEM_LIMIT:-1g}
        reservations:
          cpus: '${REDIS_CPU_RESERVATION:-0.25}'
          memory: ${REDIS_MEM_RESERVATION:-256m}
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_COVER_ASSET_BASE_URL: ${COVER_ASSET_BASE_URL:-}
    volumes:
      - reports:/reports:ro
    cpus: ${FRONTEND_CPUS:-1}
    mem_limit: ${FRONTEND_MEM_LIMIT:-768m}
    mem_reservation: ${FRONTEND_MEM_RESERVATION:-256m}
    deploy:
      resources:
        limits:
          cpus: '${FRONTEND_CPUS:-1}'
          memory: ${FRONTEND_MEM_LIMIT:-768m}
        reservations:
          cpus: '${FRONTEND_CPU_RESERVATION:-0.25}'
          memory: ${FRONTEND_MEM_RESERVATION:-256m}
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  style-knowledge-mcp:
    build:
      context: ./services/style-knowledge-mcp
      dockerfile: Dockerfile
    environment:
      PORT: '18750'
      POSTGRES_DSN: postgresql://fashion:fashion@postgres:5432/fashion_chat
      QDRANT_URL: ${QDRANT_URL:-http://220.168.84.134:16333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-aimoda2025}
      QDRANT_COLLECTION: style_knowledge
      STYLE_TEXT_ENDPOINT: ${STYLE_KNOWLEDGE_EMBEDDING_URL:-http://183.62.232.22:18730}
      STYLE_TEXT_MODEL: ${STYLE_KNOWLEDGE_EMBEDDING_MODEL:-infgrad/stella-mrl-large-zh-v3.5-1792d}
      STYLE_VECTOR_DIM: ${STYLE_KNOWLEDGE_VECTOR_DIM:-1792}
    depends_on:
      postgres:
        condition: service_healthy
    cpus: ${STYLE_MCP_CPUS:-1}
    mem_limit: ${STYLE_MCP_MEM_LIMIT:-768m}
    mem_reservation: ${STYLE_MCP_MEM_RESERVATION:-256m}
    deploy:
      resources:
        limits:
          cpus: '${STYLE_MCP_CPUS:-1}'
          memory: ${STYLE_MCP_MEM_LIMIT:-768m}
        reservations:
          cpus: '${STYLE_MCP_CPU_RESERVATION:-0.25}'
          memory: ${STYLE_MCP_MEM_RESERVATION:-256m}
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:18750/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  inspiration-gallery-mcp:
    build:
      context: ./services/inspiration-gallery-mcp
      dockerfile: Dockerfile
    environment:
      PORT: '18760'
      POSTGRES_DSN: postgresql://fashion:fashion@postgres:5432/fashion_chat
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      OSS_BUCKET_NAME: ${OSS_BUCKET_NAME:-}
      OSS_ENDPOINT: ${OSS_ENDPOINT:-oss-cn-shenzhen.aliyuncs.com}
      OSS_REGION: ${OSS_REGION:-oss-cn-shenzhen}
    depends_on:
      postgres:
        condition: service_healthy
    cpus: ${GALLERY_MCP_CPUS:-1}
    mem_limit: ${GALLERY_MCP_MEM_LIMIT:-768m}
    mem_reservation: ${GALLERY_MCP_MEM_RESERVATION:-256m}
    deploy:
      resources:
        limits:
          cpus: '${GALLERY_MCP_CPUS:-1}'
          memory: ${GALLERY_MCP_MEM_LIMIT:-768m}
        reservations:
          cpus: '${GALLERY_MCP_CPU_RESERVATION:-0.25}'
          memory: ${GALLERY_MCP_MEM_RESERVATION:-256m}
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:18760/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  fashion-report-mcp:
    build:
      context: ./services/fashion-report-mcp
      dockerfile: Dockerfile
    environment:
      PORT: '18770'
      BACKEND_URL: http://api:3000
      BACKEND_INTERNAL_TOKEN: ${REPORT_MCP_INTERNAL_TOKEN:-aimoda-report-mcp-internal-token}
      BACKEND_INTERNAL_SERVICE_NAME: fashion-report-mcp
    depends_on:
      api:
        condition: service_healthy
    cpus: ${REPORT_MCP_CPUS:-0.5}
    mem_limit: ${REPORT_MCP_MEM_LIMIT:-256m}
    mem_reservation: ${REPORT_MCP_MEM_RESERVATION:-128m}
    deploy:
      resources:
        limits:
          cpus: '${REPORT_MCP_CPUS:-0.5}'
          memory: ${REPORT_MCP_MEM_LIMIT:-256m}
        reservations:
          cpus: '${REPORT_MCP_CPU_RESERVATION:-0.25}'
          memory: ${REPORT_MCP_MEM_RESERVATION:-128m}
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:18770/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  trend-flow-mcp:
    build:
      context: ./services/trend-flow-mcp
      dockerfile: Dockerfile
    environment:
      PORT: '18790'
      BACKEND_URL: http://api:3000
      BACKEND_INTERNAL_TOKEN: ${TREND_FLOW_MCP_INTERNAL_TOKEN:-aimoda-trend-flow-mcp-internal-token}
      BACKEND_INTERNAL_SERVICE_NAME: trend-flow-mcp
    depends_on:
      api:
        condition: service_healthy
    cpus: ${TREND_FLOW_MCP_CPUS:-0.5}
    mem_limit: ${TREND_FLOW_MCP_MEM_LIMIT:-256m}
    mem_reservation: ${TREND_FLOW_MCP_MEM_RESERVATION:-128m}
    deploy:
      resources:
        limits:
          cpus: '${TREND_FLOW_MCP_CPUS:-0.5}'
          memory: ${TREND_FLOW_MCP_MEM_LIMIT:-256m}
        reservations:
          cpus: '${TREND_FLOW_MCP_CPU_RESERVATION:-0.25}'
          memory: ${TREND_FLOW_MCP_MEM_RESERVATION:-128m}
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:18790/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  aimoda-agent-mcp:
    build:
      context: ./services/aimoda-agent-mcp
      dockerfile: Dockerfile
    environment:
      PORT: '18780'
      BACKEND_URL: http://api:3000
      BACKEND_INTERNAL_TOKEN: ${AGENT_MCP_INTERNAL_TOKEN:-aimoda-agent-mcp-internal-token}
      BACKEND_INTERNAL_SERVICE_NAME: aimoda-agent-mcp
    depends_on:
      api:
        condition: service_healthy
    cpus: ${AGENT_MCP_CPUS:-0.5}
    mem_limit: ${AGENT_MCP_MEM_LIMIT:-256m}
    mem_reservation: ${AGENT_MCP_MEM_RESERVATION:-128m}
    deploy:
      resources:
        limits:
          cpus: '${AGENT_MCP_CPUS:-0.5}'
          memory: ${AGENT_MCP_MEM_LIMIT:-256m}
        reservations:
          cpus: '${AGENT_MCP_CPU_RESERVATION:-0.25}'
          memory: ${AGENT_MCP_MEM_RESERVATION:-128m}
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:18780/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - '127.0.0.1:${NGINX_PORT:-38180}:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - reports:/reports:ro
    cpus: ${NGINX_CPUS:-1}
    mem_limit: ${NGINX_MEM_LIMIT:-768m}
    mem_reservation: ${NGINX_MEM_RESERVATION:-256m}
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: '${NGINX_CPUS:-1}'
          memory: ${NGINX_MEM_LIMIT:-768m}
        reservations:
          cpus: '${NGINX_CPU_RESERVATION:-0.25}'
          memory: ${NGINX_MEM_RESERVATION:-256m}
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  db:
  reports:
  pgdata:
