name: ${COMPOSE_PROJECT_NAME:-aimoda-2026}

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ENV: production
      PORT: ${API_PORT:-3000}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:38180}
      SERVER_URL: ${SERVER_URL:-${FRONTEND_URL:-http://localhost:38180}}
      REPORTS_DIR: /reports
      DATABASE_PATH: /data/fashion-report.db
      ACCESS_TOKEN_EXPIRES_IN: ${ACCESS_TOKEN_EXPIRES_IN:-2h}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
      UPLOAD_TMP_DIR: /tmp/fashion-report-uploads
      # Agent / Chat
      QDRANT_URL: ${QDRANT_URL:-http://220.168.84.134:16333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:?QDRANT_API_KEY is required}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-fashion_items}
      LLM_MODEL: ${LLM_MODEL:-MiniMax-M2.7-highspeed}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.minimaxi.com/anthropic}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      VLM_MODEL: ${VLM_MODEL:-qwen3.5-flash}
      VLM_TEMPERATURE: ${VLM_TEMPERATURE:-0.1}
      VLM_MAX_TOKENS: ${VLM_MAX_TOKENS:-1200}
      VLM_TIMEOUT_SECONDS: ${VLM_TIMEOUT_SECONDS:-45}
      EMBEDDING_URL: ${EMBEDDING_URL:-http://183.62.232.22:18730}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-Marqo/marqo-fashionSigLIP}
      POSTGRES_DSN: postgresql://fashion:fashion@postgres:5432/fashion_chat
      REDIS_DSN: redis://redis:6379/0
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      OSS_BUCKET_NAME: ${OSS_BUCKET_NAME:-}
      OSS_ENDPOINT: ${OSS_ENDPOINT:-oss-cn-shenzhen.aliyuncs.com}
    volumes:
      - db:/data
      - reports:/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ['CMD', 'python', '-c', 'import urllib.request; urllib.request.urlopen("http://localhost:3000/api/health")']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fashion
      POSTGRES_PASSWORD: fashion
      POSTGRES_DB: fashion_chat
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fashion -d fashion_chat']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_COVER_ASSET_BASE_URL: ${COVER_ASSET_BASE_URL:-}
    volumes:
      - reports:/reports:ro
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  style-knowledge-mcp:
    build:
      context: ./services/style-knowledge-mcp
      dockerfile: Dockerfile
    environment:
      PORT: '18750'
      QDRANT_URL: ${QDRANT_URL:-http://220.168.84.134:16333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-aimoda2025}
      QDRANT_COLLECTION: style_knowledge
      STYLE_TEXT_ENDPOINT: ${STYLE_KNOWLEDGE_EMBEDDING_URL:-http://183.62.232.22:18730}
      STYLE_TEXT_MODEL: ${STYLE_KNOWLEDGE_EMBEDDING_MODEL:-infgrad/stella-mrl-large-zh-v3.5-1792d}
      STYLE_VECTOR_DIM: ${STYLE_KNOWLEDGE_VECTOR_DIM:-1792}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:18750/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  inspiration-gallery-mcp:
    build:
      context: ./services/inspiration-gallery-mcp
      dockerfile: Dockerfile
    environment:
      PORT: '18760'
      POSTGRES_DSN: postgresql://fashion:fashion@postgres:5432/fashion_chat
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      OSS_BUCKET_NAME: ${OSS_BUCKET_NAME:-}
      OSS_ENDPOINT: ${OSS_ENDPOINT:-oss-cn-shenzhen.aliyuncs.com}
      OSS_REGION: ${OSS_REGION:-oss-cn-shenzhen}
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:18760/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  fashion-report-mcp:
    build:
      context: ./services/fashion-report-mcp
      dockerfile: Dockerfile
    environment:
      PORT: '18770'
      BACKEND_URL: http://api:3000
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:18770/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - '127.0.0.1:${NGINX_PORT:-38180}:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - reports:/reports:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  db:
  reports:
  pgdata:
