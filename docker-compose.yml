name: aimoda-2026

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ENV: production
      PORT: ${API_PORT:-3000}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:38180}
      SERVER_URL: ${SERVER_URL:-${FRONTEND_URL:-http://localhost:38180}}
      REPORTS_DIR: /reports
      DATABASE_PATH: /data/fashion-report.db
      ACCESS_TOKEN_EXPIRES_IN: ${ACCESS_TOKEN_EXPIRES_IN:-2h}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
      UPLOAD_TMP_DIR: /tmp/fashion-report-uploads
      # Agent / Chat
      QDRANT_URL: ${QDRANT_URL:-http://202.104.119.31:16333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:?QDRANT_API_KEY is required}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-fashion_items}
      LLM_MODEL: ${LLM_MODEL:-MiniMax-M2.5-highspeed}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.minimaxi.com/anthropic}
      EMBEDDING_URL: ${EMBEDDING_URL:-http://183.62.232.22:18730}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-Marqo/marqo-fashionSigLIP}
      POSTGRES_DSN: postgresql://fashion:fashion@postgres:5432/fashion_chat
      REDIS_DSN: redis://redis:6379/0
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      OSS_BUCKET_NAME: ${OSS_BUCKET_NAME:-}
      OSS_ENDPOINT: ${OSS_ENDPOINT:-oss-cn-hangzhou.aliyuncs.com}
    volumes:
      - db:/data
      - reports:/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ['CMD', 'python', '-c', 'import urllib.request; urllib.request.urlopen("http://localhost:3000/api/health")']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fashion
      POSTGRES_PASSWORD: fashion
      POSTGRES_DB: fashion_chat
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fashion -d fashion_chat']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - reports:/reports:ro
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - '38180:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - reports:/reports:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  db:
  reports:
  pgdata:
